<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Matemático</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #4ade80;
      --blue: #60a5fa;
      --amber: #fbbf24;
      --red: #f87171;
      --bg: #080c1a;
      --surface: #0d1424;
      --border: rgba(74,222,128,0.14);
      --muted: #475569;
      --text: #e2e8f0;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      color: var(--text);
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(99,140,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,140,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridScroll 25s linear infinite;
      pointer-events: none;
    }
    @keyframes gridScroll { to { background-position: 40px 40px; } }

    /* Corner accents */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: clamp(36px, 6vw, 52px) clamp(28px, 5vw, 44px) clamp(32px, 5vw, 44px);
      width: min(460px, 94vw);
      box-shadow: 0 0 0 1px rgba(74,222,128,0.04), 0 32px 80px rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .logo-mark {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, #4ade80, #22c55e);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 900;
      color: #050916;
      letter-spacing: 0;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #4ade80, #86efac);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .tagline {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .btn {
      flex: 1;
      padding: 14px 10px;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(10px, 2.5vw, 12px);
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-green {
      background: var(--green);
      color: #050916;
    }
    .btn-green:hover { background: #86efac; box-shadow: 0 0 20px rgba(74,222,128,0.35); }

    .btn-amber {
      background: var(--amber);
      color: #050916;
    }
    .btn-amber:hover { background: #fde68a; box-shadow: 0 0 20px rgba(251,191,36,0.35); }

    .btn-blue {
      background: var(--blue);
      color: #050916;
    }
    .btn-blue:hover { background: #93c5fd; box-shadow: 0 0 20px rgba(96,165,250,0.35); }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 0 0 18px;
      color: #1e293b;
      font-size: 9px;
      letter-spacing: 3px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #1e293b;
    }

    .btn-secondary {
      width: 100%;
      padding: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      background: transparent;
      border: 1px solid #1e293b;
      border-radius: 9px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      border-color: var(--blue);
      color: var(--blue);
      background: rgba(96,165,250,0.04);
    }

    /* INPUTS */
    .input-group {
      margin-bottom: 14px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 14px 18px;
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      background: rgba(255,255,255,0.03);
      border: 1.5px solid rgba(74,222,128,0.15);
      border-radius: 10px;
      color: var(--text);
      outline: none;
      text-align: center;
      letter-spacing: 1px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: #334155; }
    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(74,222,128,0.08);
    }

    .error-msg {
      color: var(--red);
      font-size: 11px;
      margin-bottom: 12px;
      min-height: 14px;
      letter-spacing: 1px;
    }

    .pin-box {
      margin-bottom: 18px;
      padding: 16px 18px;
      background: rgba(74,222,128,0.06);
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: 12px;
    }
    .pin-box-label {
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .pin-value {
      font-family: 'Orbitron', monospace;
      font-size: 30px;
      color: var(--green);
      letter-spacing: 6px;
      font-weight: bold;
    }
    .pin-warning {
      color: var(--muted);
      font-size: 9px;
      text-align: center;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    .btn-back {
      width: 100%;
      padding: 11px;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      background: transparent;
      border: 1px solid #1e293b;
      color: var(--muted);
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      text-transform: uppercase;
    }
    .btn-back:hover { border-color: var(--muted); color: var(--text); }
  </style>
</head>
<body>

<!-- PANTALLA INICIO -->
<div class="card" id="pantalla-inicio">
  <div class="logo-mark">S</div>
  <h1>SNAKE MATEMÁTICO</h1>
  <p class="tagline">Pon a prueba tus habilidades</p>

  <div class="btn-row">
    <button class="btn btn-green" onclick="mostrarRegistro()">CREAR CUENTA</button>
    <button class="btn btn-amber" onclick="mostrarIngreso()">INGRESAR</button>
  </div>

  <div class="divider">ACCESO</div>
  <button class="btn-secondary" onclick="window.location='./profesor.html'">Panel del Profesor</button>
</div>

<!-- PANTALLA REGISTRO -->
<div class="card" id="pantalla-registro" style="display:none;">
  <h1>CREAR CUENTA</h1>
  <p class="tagline">Completa tus datos</p>

  <div class="input-group">
    <input type="text" id="reg-nombre" placeholder="Nombre completo" maxlength="50" autocomplete="off">
  </div>
  <div class="input-group">
    <input type="text" id="reg-edad" placeholder="Edad" autocomplete="off" inputmode="numeric">
  </div>
  <div class="input-group">
    <input type="text" id="reg-escuela" placeholder="Escuela (opcional)" maxlength="50" autocomplete="off">
  </div>
  <div class="input-group">
    <input type="text" id="reg-grupo" placeholder="Grupo, ej: 6A (opcional)" maxlength="20" autocomplete="off">
  </div>

  <div class="error-msg" id="reg-error"></div>

  <div class="pin-box" id="reg-pin-generado" style="display:none;">
    <div class="pin-box-label">Tu usuario corto</div>
    <div class="pin-value" id="reg-usuario-valor" style="font-size:22px;letter-spacing:3px;"></div>
    <div class="pin-box-label">Tu código de acceso</div>
    <div class="pin-value" id="reg-pin-valor"></div>
    <div class="pin-warning">Guarda usuario y código. Los necesitarás para ingresar.</div>
  </div>

  <button class="btn btn-green" id="btn-crear" onclick="crearCuenta()" style="width:100%;margin-bottom:8px;">CREAR CUENTA</button>
  <button class="btn btn-green" id="btn-continuar-login" onclick="irALoginConPin()" style="width:100%;display:none;margin-bottom:8px;">CONTINUAR A INGRESO</button>
  <button class="btn-back" onclick="mostrarInicio()">Volver</button>
</div>

<!-- PANTALLA INGRESO -->
<div class="card" id="pantalla-ingreso" style="display:none;">
  <h1>INGRESAR</h1>
  <p class="tagline">Accede a tu cuenta</p>

  <div class="input-group">
    <input type="text" id="ing-usuario" placeholder="Tu usuario corto" maxlength="20" autocomplete="off">
  </div>
  <div class="input-group">
    <input type="text" id="ing-pin" placeholder="Código de 6 dígitos" maxlength="6" autocomplete="off" inputmode="numeric">
  </div>

  <div class="error-msg" id="ing-error"></div>

  <button class="btn btn-amber" id="btn-ingresar" onclick="ingresarCuenta()" style="width:100%;margin-bottom:8px;">INGRESAR</button>
  <button class="btn-back" onclick="mostrarInicio()">Volver</button>
</div>

<script src="config.js"></script>
<script>
  function textoEnMayusculas(valor = '') {
    return String(valor)
      .trim()
      .replace(/\s+/g, ' ')
      .toUpperCase();
  }

  function mostrarInicio() {
    document.getElementById('pantalla-inicio').style.display = 'block';
    document.getElementById('pantalla-registro').style.display = 'none';
    document.getElementById('pantalla-ingreso').style.display = 'none';
  }

  function mostrarRegistro() {
    document.getElementById('pantalla-inicio').style.display = 'none';
    document.getElementById('pantalla-registro').style.display = 'block';
    document.getElementById('pantalla-ingreso').style.display = 'none';
    document.getElementById('reg-error').textContent = '';
    document.getElementById('reg-pin-generado').style.display = 'none';
    document.getElementById('reg-nombre').value = '';
    document.getElementById('reg-edad').value = '';
    document.getElementById('reg-escuela').value = '';
    document.getElementById('reg-grupo').value = '';
    document.getElementById('btn-crear').style.display = 'block';
    document.getElementById('btn-continuar-login').style.display = 'none';
    document.getElementById('reg-nombre').disabled = false;
    document.getElementById('reg-edad').disabled = false;
    document.getElementById('reg-escuela').disabled = false;
    document.getElementById('reg-grupo').disabled = false;
  }

  function mostrarIngreso() {
    document.getElementById('pantalla-inicio').style.display = 'none';
    document.getElementById('pantalla-registro').style.display = 'none';
    document.getElementById('pantalla-ingreso').style.display = 'block';
    document.getElementById('ing-error').textContent = '';
    document.getElementById('ing-usuario').value = '';
    document.getElementById('ing-pin').value = '';
    document.getElementById('ing-usuario').focus();
  }

  document.getElementById('ing-usuario').addEventListener('keypress', e => {
    if (e.key === 'Enter') document.getElementById('ing-pin').focus();
  });
  document.getElementById('ing-pin').addEventListener('keypress', e => {
    if (e.key === 'Enter') ingresarCuenta();
  });

  document.getElementById('reg-nombre').addEventListener('input', (e) => {
    e.target.value = textoEnMayusculas(e.target.value);
  });
  document.getElementById('reg-escuela').addEventListener('input', (e) => {
    e.target.value = textoEnMayusculas(e.target.value);
  });
  document.getElementById('reg-grupo').addEventListener('input', (e) => {
    e.target.value = textoEnMayusculas(e.target.value);
  });

  async function crearCuenta() {
    const nombre  = textoEnMayusculas(document.getElementById('reg-nombre').value);
    const edad    = document.getElementById('reg-edad').value.trim();
    const escuela = textoEnMayusculas(document.getElementById('reg-escuela').value);
    const grupo   = textoEnMayusculas(document.getElementById('reg-grupo').value);
    const errorDiv = document.getElementById('reg-error');
    errorDiv.textContent = '';

    document.getElementById('reg-nombre').value = nombre;

    if (!nombre || nombre.length < 2) {
      errorDiv.textContent = 'El nombre debe tener al menos 2 letras';
      return;
    }
    if (!/^\d+$/.test(edad)) {
      errorDiv.textContent = 'Ingresa una edad válida';
      return;
    }
    const edadNum = Number(edad);
    if (edadNum < 0) {
      errorDiv.textContent = 'La edad no puede ser negativa';
      return;
    }

    const btn = document.getElementById('btn-crear');
    btn.disabled = true;
    btn.textContent = 'Creando...';

    try {
      const res = await fetch(CONFIG.ENDPOINTS.alumno.registrar, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, edad: edadNum, escuela: escuela || null, grupo: grupo || null })
      });
      const data = await res.json();

      if (!res.ok) {
        errorDiv.textContent = data.error || 'Error al crear la cuenta';
        btn.disabled = false;
        btn.textContent = 'CREAR CUENTA';
        return;
      }

      document.getElementById('reg-usuario-valor').textContent = data.alumno.usuario;
      document.getElementById('reg-pin-valor').textContent = data.alumno.pin;
      document.getElementById('reg-pin-generado').style.display = 'block';
      document.getElementById('reg-nombre').disabled = true;
      document.getElementById('reg-edad').disabled = true;
      document.getElementById('reg-escuela').disabled = true;
      document.getElementById('reg-grupo').disabled = true;
      document.getElementById('btn-crear').style.display = 'none';
      document.getElementById('btn-continuar-login').style.display = 'block';
      window.pinRegistrado = { usuario: data.alumno.usuario, pin: data.alumno.pin };
    } catch (e) {
      errorDiv.textContent = 'Error de conexión. Intenta de nuevo.';
      btn.disabled = false;
      btn.textContent = 'CREAR CUENTA';
    }
  }

  function irALoginConPin() {
    mostrarIngreso();
    if (window.pinRegistrado) {
      document.getElementById('ing-usuario').value = window.pinRegistrado.usuario;
      document.getElementById('ing-pin').value = window.pinRegistrado.pin;
    }
  }

  async function ingresarCuenta() {
    const usuario  = document.getElementById('ing-usuario').value.trim();
    const pin      = document.getElementById('ing-pin').value.trim();
    const errorDiv = document.getElementById('ing-error');
    errorDiv.textContent = '';

    if (!usuario || usuario.length < 3) { errorDiv.textContent = 'Ingresa tu usuario'; return; }
    if (!pin || pin.length < 4) { errorDiv.textContent = 'Ingresa tu código de 6 dígitos'; return; }

    const btn = document.getElementById('btn-ingresar');
    btn.disabled = true;
    btn.textContent = 'Ingresando...';

    try {
      const res = await fetch(CONFIG.ENDPOINTS.alumno.login, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario, pin })
      });
      const data = await res.json();

      if (!res.ok) {
        errorDiv.textContent = data.error || 'Usuario o código incorrectos';
        btn.disabled = false;
        btn.textContent = 'INGRESAR';
        return;
      }

      sessionStorage.setItem('alumno_id', data.alumno.id);
      sessionStorage.setItem('alumno_nombre', data.alumno.nombre);
      window.location = './juego.html';
    } catch (e) {
      errorDiv.textContent = 'Error de conexión. Intenta de nuevo.';
      btn.disabled = false;
      btn.textContent = 'INGRESAR';
    }
  }

  mostrarInicio();
</script>
</body>
</html>
