<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Matemático · Jugando</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080c1a;
      color: #e2e8f0;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(12px, 3vw, 16px) clamp(8px, 2vw, 10px) clamp(30px, 8vw, 36px);
      overflow-x: hidden;
    }
    
    @media (max-width: 480px) {
      body { padding: 10px 6px 28px; }
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(99,140,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,140,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    header { position:relative;z-index:1;text-align:center;margin-bottom:12px; }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 900; letter-spacing: 4px;
      background: linear-gradient(90deg, #4ade80, #86efac, #4ade80);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 10px rgba(74,222,128,0.35));
    }

    #alumno-nombre {
      font-size: clamp(9px, 2vw, 11px); color: #64748b; letter-spacing: 2px; margin-top: 3px;
    }

    .hud {
      position: relative; z-index: 1;
      display: flex; gap: clamp(8px, 2vw, 12px); margin-bottom: 10px;
      align-items: center; flex-wrap: wrap; justify-content: center;
    }

    .hud-box {
      background: rgba(148,163,255,0.06);
      border: 1px solid rgba(74,222,128,0.15);
      border-radius: 10px; padding: clamp(6px, 1.5vw, 8px) clamp(12px, 3vw, 20px);
      text-align: center; min-width: clamp(70px, 20vw, 90px);
    }
    .hud-label { font-size: clamp(8px, 1.5vw, 9px); letter-spacing: 2px; color: #64748b; text-transform: uppercase; }
    .hud-value { font-family:'Orbitron',sans-serif; font-size: clamp(18px, 4vw, 22px); color: #4ade80;
      filter: drop-shadow(0 0 5px rgba(74,222,128,0.45)); }

    .lives-dots { display:flex; gap:clamp(3px, 1vw, 5px); justify-content:center; margin-top:4px; }
    .dot { width:clamp(10px, 2vw, 12px); height:clamp(10px, 2vw, 12px); border-radius:50%; background:#4ade80;
      box-shadow: 0 0 7px #4ade80; transition: all 0.3s; }
    .dot.dead { background: #1e293b; box-shadow: none; }

    #operation {
      position: relative; z-index: 1;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(24px, 5vw, 42px); font-weight: 700;
      margin-bottom: 6px; padding: 12px 36px; border-radius: 14px;
      background: rgba(148,163,255,0.06);
      border: 1px solid rgba(74,222,128,0.2);
      letter-spacing: 2px; color: white;
    }

    #level-label {
      position: relative; z-index: 1;
      font-size: clamp(9px, 1.5vw, 10px); letter-spacing: 3px; color: #fbbf24;
      text-transform: uppercase; margin-bottom: 12px; opacity: 0.85;
    }

    .canvas-wrap { position: relative; z-index: 1; }

    #game {
      border-radius: 16px; background: #0b1120; display: block; max-width: 100%;
      height: auto; aspect-ratio: 1;
      box-shadow: 0 0 0 1px rgba(99,140,255,0.2), 0 0 0 3px rgba(99,140,255,0.06),
        0 20px 60px rgba(0,0,0,0.85);
    }
    
    @media (max-width: 600px) {
      #game { max-width: calc(100vw - 16px); }
    }

    /* ── OVERLAY GAME OVER con análisis ─────────────────────────────────── */
    #overlay {
      display: none; position: absolute; inset: 0; border-radius: 16px;
      background: rgba(2,6,23,0.94); backdrop-filter: blur(8px);
      flex-direction: column; align-items: center; z-index: 10;
      overflow-y: auto; padding: 32px 28px 28px;
    }
    #overlay.show { display: flex; }

    .overlay-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(22px, 4vw, 36px); font-weight: 900; letter-spacing: 4px;
      color: #f87171; filter: drop-shadow(0 0 12px rgba(248,113,113,0.5));
      margin-bottom: 4px;
    }

    .overlay-puntos {
      font-family: 'Orbitron', sans-serif; font-size: 28px;
      color: #fbbf24; filter: drop-shadow(0 0 8px rgba(251,191,36,0.5));
      margin-bottom: 18px;
    }

    /* Análisis de errores */
    .analysis-title {
      font-size: 10px; letter-spacing: 3px; color: #64748b;
      text-transform: uppercase; margin-bottom: 12px;
      align-self: flex-start;
    }

    .errores-grid {
      width: 100%; display: flex; flex-direction: column; gap: 8px;
      margin-bottom: 20px;
    }

    .error-item {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(248,113,113,0.07);
      border: 1px solid rgba(248,113,113,0.18);
      border-radius: 10px; padding: 10px 14px;
      font-size: 13px;
    }

    .error-op { font-family: 'Orbitron', sans-serif; color: #fca5a5; font-size: 14px; }
    .error-detail { color: #64748b; font-size: 11px; margin-top: 2px; }
    .error-badge {
      background: rgba(248,113,113,0.15); border-radius: 6px;
      padding: 3px 8px; font-size: 11px; color: #f87171; white-space: nowrap;
    }

    .sin-errores {
      text-align: center; padding: 20px;
      color: #4ade80; font-size: 13px; letter-spacing: 1px;
    }

    .resumen-tipos {
      width: 100%; margin-bottom: 20px;
    }
    .tipo-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px; font-size: 12px; color: #94a3b8;
    }
    .tipo-label { min-width: 120px; }
    .tipo-bar-wrap { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
    .tipo-bar { height: 100%; border-radius: 4px; background: #f87171; transition: width 0.8s ease; }
    .tipo-count { min-width: 24px; text-align: right; color: #f87171; }

    .btn-reiniciar {
      padding: 12px 32px; font-family: 'Orbitron', sans-serif;
      font-size: 13px; letter-spacing: 3px; background: transparent;
      border: 2px solid #4ade80; color: #4ade80; border-radius: 10px;
      cursor: pointer; text-transform: uppercase; transition: all 0.2s; margin-bottom: 10px;
    }
    .btn-reiniciar:hover { background: #4ade80; color: #020617; box-shadow: 0 0 20px rgba(74,222,128,0.4); }

    .btn-salir {
      font-size: 11px; color: #475569; background: none; border: none;
      cursor: pointer; letter-spacing: 2px; text-decoration: underline;
    }
    .btn-salir:hover { color: #94a3b8; }

    .controls {
      position: relative; z-index: 1; margin-top: 12px;
      display: flex; gap: 16px; align-items: center;
      color: #64748b; font-size: 11px; letter-spacing: 1px;
      flex-wrap: wrap; justify-content: center;
    }
    .key {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border: 1px solid #334155;
      border-radius: 5px; background: #0f172a; font-size: 11px;
      color: #94a3b8; margin: 0 2px;
    }

    .dpad { position:relative;z-index:1;display:none;margin-top:clamp(12px, 3vw, 16px);flex-direction:column;align-items:center; }
    @media (max-width:600px) { .dpad { display:flex; } }
    .dpad-row { display:flex; gap:clamp(4px, 1vw, 6px); }
    .dpad-btn {
      width:clamp(45px, 12vw, 60px); height:clamp(45px, 12vw, 60px); background:rgba(148,163,255,0.06);
      border:1px solid rgba(74,222,128,0.2); border-radius:10px;
      color:#4ade80; font-size:clamp(18px, 4vw, 24px); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.1s; -webkit-tap-highlight-color:transparent;
    }
    .dpad-btn:active { background:rgba(74,222,128,0.15); }
    .dpad-spacer { width:clamp(45px, 12vw, 60px); height:clamp(45px, 12vw, 60px); }
  </style>
</head>
<body>

  <header>
    <h1>Snake Matemático</h1>
    <div id="alumno-nombre">Cargando...</div>
  </header>

  <div class="hud">
    <div class="hud-box"><div class="hud-label">Puntos</div><div class="hud-value" id="score-val">0</div></div>
    <div class="hud-box"><div class="hud-label">Mejor</div><div class="hud-value" id="best-val">0</div></div>
    <div class="hud-box"><div class="hud-label">Vidas</div><div class="lives-dots" id="lives-dots"></div></div>
  </div>

  <div id="operation">Cargando...</div>
  <div id="level-label">NIVEL 1</div>

  <div class="canvas-wrap">
    <canvas id="game" width="840" height="840"></canvas>
    <div id="overlay">
      <div class="overlay-title">GAME OVER</div>
      <div class="overlay-puntos" id="overlay-puntos">0 puntos</div>

      <div class="analysis-title">⚠ Operaciones donde te equivocaste</div>

      <div class="resumen-tipos" id="resumen-tipos"></div>

      <div class="errores-grid" id="errores-lista"></div>

      <button class="btn-reiniciar" id="restart-btn">JUGAR DE NUEVO</button>
      <button class="btn-salir" onclick="window.location='./index.html'">Salir</button>
    </div>
  </div>

  <div class="controls">
    <span><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> · mover</span>
    <span><span class="key">↑</span><span class="key">←</span><span class="key">↓</span><span class="key">→</span> · mover</span>
  </div>

  <div class="dpad">
    <div class="dpad-row"><div class="dpad-spacer"></div><button class="dpad-btn" id="btn-up">▲</button><div class="dpad-spacer"></div></div>
    <div class="dpad-row" style="margin:6px 0"><button class="dpad-btn" id="btn-left">◀</button><div class="dpad-spacer"></div><button class="dpad-btn" id="btn-right">▶</button></div>
    <div class="dpad-row"><div class="dpad-spacer"></div><button class="dpad-btn" id="btn-down">▼</button><div class="dpad-spacer"></div></div>
  </div>

<script src="config.js"></script>
<script>
// ── Sesión ────────────────────────────────────────────────────────────────────
const ALUMNO_ID     = parseInt(sessionStorage.getItem('alumno_id')) || null;
const ALUMNO_NOMBRE = sessionStorage.getItem('alumno_nombre') || 'Alumno';

if (!ALUMNO_ID) { window.location = './index.html'; }

document.getElementById('alumno-nombre').textContent = `👤 ${ALUMNO_NOMBRE}`;

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById("game");
const ctx    = canvas.getContext("2d");

function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 24, window.innerHeight - 260, 840);
  canvas.style.width = canvas.style.height = maxW + "px";
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const CELLS = 30;
const SIZE  = canvas.width / CELLS;
const MAX_LIVES = 3;

// ── Estado ────────────────────────────────────────────────────────────────────
let snake, dir, nextDir, answers, correctAnswer, currentOp, currentTipoOp;
let gameOver, score, bestScore = 0, lives;
let flashColor, flashTimer, particles;
let erroresPartida = []; // registro de errores de esta partida
let nivelMax = 1;

// ── Init ──────────────────────────────────────────────────────────────────────
function initGame() {
  snake         = [{ x:15, y:15 }, { x:14, y:15 }, { x:13, y:15 }];
  dir           = { x:1, y:0 };
  nextDir       = { x:1, y:0 };
  answers       = [];
  gameOver      = false;
  score         = 0;
  lives         = MAX_LIVES;
  particles     = [];
  flashColor    = null;
  flashTimer    = 0;
  erroresPartida = [];
  nivelMax      = 1;
  document.getElementById("overlay").classList.remove("show");
  updateHUD();
  newQuestion();
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById("score-val").textContent = score;
  document.getElementById("best-val").textContent  = bestScore;
  const dots = document.getElementById("lives-dots");
  dots.innerHTML = "";
  for (let i = 0; i < MAX_LIVES; i++) {
    const d = document.createElement("div");
    d.className = "dot" + (i >= lives ? " dead" : "");
    dots.appendChild(d);
  }
}

// ── Partículas ────────────────────────────────────────────────────────────────
function spawnParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI*2/12)*i + Math.random()*0.4;
    const speed = 1.5 + Math.random()*2;
    particles.push({ x:x*SIZE+SIZE/2, y:y*SIZE+SIZE/2,
      vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed, life:1, color });
  }
}
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.life-=0.04; });
}
function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function rand(n) { return Math.floor(Math.random()*n); }

function safePosition() {
  let pos, tries = 0;
  do {
    pos = { x:rand(CELLS), y:rand(CELLS) };
    tries++;
    if (tries > 200) break;
  } while (snake.some(s=>s.x===pos.x&&s.y===pos.y) || answers.some(a=>a.x===pos.x&&a.y===pos.y));
  return pos;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function safe(n) { return Number.isInteger(n) && n >= 0 && n <= 999; }

function makeDistractor(correct, used, spread) {
  let v, tries=0;
  do {
    const offset = rand(spread*2+1) - spread;
    v = correct + (offset===0 ? spread : offset);
    tries++;
  } while (used.has(v) && tries<80);
  used.add(v);
  return v;
}

// ── Motor de preguntas ────────────────────────────────────────────────────────
function getLevel() { return Math.min(7, Math.floor(score / 4)); }

function buildOps(level) {
  const ops = [];

  // Nivel 0: SOLO Suma & Resta
  if (level === 0) {
    ops.push(() => { const a=rand(12)+1,b=rand(12)+1; return {q:`${a} + ${b}`,ans:a+b,tipo:'Suma'}; });
    ops.push(() => { const b=rand(10)+1,a=b+rand(15)+1; return {q:`${a} − ${b}`,ans:a-b,tipo:'Resta'}; });
  }
  // Nivel 1: Multiplicación (+ repaso Suma/Resta)
  else if (level === 1) {
    ops.push(() => { const a=rand(10)+1,b=rand(10)+1; return {q:`${a} × ${b}`,ans:a*b,tipo:'Multiplicación'}; });
    ops.push(() => { const a=rand(12)+1,b=rand(12)+1; return {q:`${a} + ${b}`,ans:a+b,tipo:'Suma'}; });
    ops.push(() => { const b=rand(10)+1,a=b+rand(15)+1; return {q:`${a} − ${b}`,ans:a-b,tipo:'Resta'}; });
  }
  // Nivel 2: División (+ repaso Multiplicación)
  else if (level === 2) {
    ops.push(() => { const b=rand(9)+2,ans=rand(12)+1; return {q:`${ans*b} ÷ ${b}`,ans,tipo:'División'}; });
    ops.push(() => { const a=rand(10)+1,b=rand(10)+1; return {q:`${a} × ${b}`,ans:a*b,tipo:'Multiplicación'}; });
  }
  // Nivel 3: Jerarquía básica (Suma/Resta con Multiplicación)
  else if (level === 3) {
    ops.push(() => { const a=rand(8)+1,b=rand(6)+1,c=rand(8)+1; return {q:`${a} + ${b} × ${c}`,ans:a+b*c,tipo:'Jerarquía (+×)'}; });
    ops.push(() => { const a=rand(10)+5,b=rand(6)+1,c=rand(5)+1; const ans=a-b*c; if(!safe(ans))return null; return {q:`${a} − ${b} × ${c}`,ans,tipo:'Jerarquía (−×)'}; });
  }
  // Nivel 4: Jerarquía con División
  else if (level === 4) {
    ops.push(() => { const b=rand(8)+2,c=rand(8)+1,a=rand(10)+1; return {q:`${a} + ${b*c} ÷ ${b}`,ans:a+c,tipo:'Jerarquía (+÷)'}; });
    ops.push(() => { const b=rand(8)+2,c=rand(8)+1,a=rand(10)+c+1; return {q:`${a} − ${b*c} ÷ ${b}`,ans:a-c,tipo:'Jerarquía (−÷)'}; });
    // Repaso de Jerarquía básica
    ops.push(() => { const a=rand(8)+1,b=rand(6)+1,c=rand(8)+1; return {q:`${a} + ${b} × ${c}`,ans:a+b*c,tipo:'Jerarquía (+×)'}; });
  }
  // Nivel 5: Paréntesis
  else if (level === 5) {
    ops.push(() => { const a=rand(8)+1,b=rand(8)+1,c=rand(8)+2; return {q:`(${a} + ${b}) × ${c}`,ans:(a+b)*c,tipo:'Paréntesis'}; });
    ops.push(() => { const b=rand(6)+1,a=b+rand(8)+1,c=rand(6)+2; return {q:`(${a} − ${b}) × ${c}`,ans:(a-b)*c,tipo:'Paréntesis'}; });
    ops.push(() => { const c=rand(8)+2,ans=rand(10)+1,b=rand(6)+1; return {q:`(${ans*c} + ${b*c}) ÷ ${c}`,ans:ans+b,tipo:'Paréntesis'}; });
  }
  // Nivel 6: Doble multiplicación
  else if (level === 6) {
    ops.push(() => { const a=rand(6)+1,b=rand(6)+1,c=rand(6)+2,d=rand(6)+1; return {q:`${a} × ${b} + ${c} × ${d}`,ans:a*b+c*d,tipo:'Doble multiplicación'}; });
    ops.push(() => { const a=rand(6)+1,b=rand(6)+1,c=rand(6)+2,d=rand(6)+1; const ans=a*b-c*d; if(!safe(ans))return null; return {q:`${a} × ${b} − ${c} × ${d}`,ans,tipo:'Doble multiplicación'}; });
  }
  // Nivel 7: Maestro - Paréntesis dobles y expresiones complejas
  else if (level >= 7) {
    ops.push(() => { const a=rand(5)+1,b=rand(5)+1,c=rand(5)+2,d=rand(5)+1; return {q:`(${a} + ${b}) × (${c} − ${d})`,ans:(a+b)*(c-d),tipo:'Paréntesis dobles'}; });
    ops.push(() => { const a=rand(6)+2,b=rand(5)+1,c=rand(5)+2,d=rand(4)+1; return {q:`${a} × ${b} + (${c} − ${d})`,ans:a*b+(c-d),tipo:'Mixta avanzada'}; });
  }

  return ops.filter(Boolean);
}

function newQuestion() {
  const level = getLevel();
  nivelMax = Math.max(nivelMax, level + 1);

  // Solo mostrar el número del nivel sin nombres de operaciones
  document.getElementById("level-label").textContent = `NIVEL ${level + 1}`;

  const ops = buildOps(level);
  let chosen = null;
  for (let i=0; i<30; i++) {
    const fn = ops[rand(ops.length)];
    const r  = fn();
    if (r && safe(r.ans)) { chosen = r; break; }
  }
  if (!chosen) {
    const a=rand(9)+1,b=rand(9)+1;
    chosen = { q:`${a} + ${b}`, ans:a+b, tipo:'Suma' };
  }

  correctAnswer   = chosen.ans;
  currentOp       = chosen.q + ' = ?';
  currentTipoOp   = chosen.tipo;
  document.getElementById("operation").textContent = currentOp;

  answers = [];
  const correctIndex = rand(4);
  const used = new Set([correctAnswer]);
  const spread = Math.max(3, Math.min(15, Math.floor(correctAnswer*0.35)+2));

  for (let i=0; i<4; i++) {
    const value = (i===correctIndex) ? correctAnswer : makeDistractor(correctAnswer, used, spread);
    const pos = safePosition();
    answers.push({ x:pos.x, y:pos.y, value, pulse:0 });
  }
}

// ── Update ────────────────────────────────────────────────────────────────────
function update() {
  if (gameOver) return;
  dir = { ...nextDir };
  const head = { x:snake[0].x+dir.x, y:snake[0].y+dir.y };

  if (head.x<0||head.y<0||head.x>=CELLS||head.y>=CELLS) { triggerDeath(); return; }
  for (let i=0; i<snake.length-1; i++) {
    if (snake[i].x===head.x&&snake[i].y===head.y) { triggerDeath(); return; }
  }

  snake.unshift(head);
  let ate = false;

  for (let a of answers) {
    if (a.x===head.x && a.y===head.y) {
      if (a.value===correctAnswer) {
        ate = true;
        score++;
        if (score>bestScore) bestScore=score;
        spawnParticles(head.x, head.y, "#4ade80");
        flashColor="rgba(74,222,128,0.15)"; flashTimer=8;
        updateHUD(); newQuestion();
      } else {
        // Registrar error
        erroresPartida.push({
          operacion: currentOp,
          respuesta_dada: a.value,
          respuesta_correcta: correctAnswer,
          tipo_op: currentTipoOp
        });
        lives--;
        spawnParticles(head.x, head.y, "#f87171");
        flashColor="rgba(248,113,113,0.2)"; flashTimer=12;
        updateHUD();
        if (lives<=0) { snake.pop(); showGameOver(); return; }
        answers = answers.filter(x=>x!==a);
        const pos = safePosition();
        answers.push({ x:pos.x, y:pos.y, value:a.value, pulse:0 });
      }
      break;
    }
  }

  if (!ate) snake.pop();
  answers.forEach(a => a.pulse = (a.pulse||0)+0.05);
}

function triggerDeath() {
  erroresPartida.push({
    operacion: currentOp,
    respuesta_dada: -1,
    respuesta_correcta: correctAnswer,
    tipo_op: currentTipoOp + ' (colisión)'
  });
  lives--;
  spawnParticles(snake[0].x, snake[0].y, "#f87171");
  flashColor="rgba(248,113,113,0.25)"; flashTimer=15;
  updateHUD();
  if (lives<=0) showGameOver();
}

// ── Game Over + guardar ───────────────────────────────────────────────────────
async function showGameOver() {
  gameOver = true;
  if (score>bestScore) bestScore=score;

  // Guardar en backend
  try {
    await fetch(CONFIG.ENDPOINTS.partida, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        alumno_id: ALUMNO_ID,
        puntuacion: score,
        nivel_max: nivelMax,
        errores: erroresPartida
      })
    });
  } catch(e) { console.warn('No se pudo guardar la partida', e); }

  // Mostrar análisis
  document.getElementById("overlay-puntos").textContent = `${score} punto${score!==1?'s':''}`;

  // Resumen por tipo de operación
  const porTipo = {};
  erroresPartida.forEach(e => {
    const t = e.tipo_op.replace(' (colisión)', '');
    porTipo[t] = (porTipo[t]||0)+1;
  });
  const maxErr = Math.max(1, ...Object.values(porTipo));
  const tipos  = Object.entries(porTipo).sort((a,b)=>b[1]-a[1]);

  const resumenEl = document.getElementById("resumen-tipos");
  if (tipos.length > 0) {
    resumenEl.innerHTML = tipos.map(([tipo, count]) => `
      <div class="tipo-row">
        <span class="tipo-label">${tipo}</span>
        <div class="tipo-bar-wrap">
          <div class="tipo-bar" style="width:${(count/maxErr)*100}%"></div>
        </div>
        <span class="tipo-count">${count}</span>
      </div>
    `).join('');
  } else {
    resumenEl.innerHTML = '';
  }

  // Lista de errores individuales (máx 8)
  const listaEl = document.getElementById("errores-lista");
  // Solo errores de respuesta incorrecta (no colisiones)
  const errReales = erroresPartida.filter(e => e.respuesta_dada !== -1);

  if (errReales.length === 0) {
    listaEl.innerHTML = `<div class="sin-errores">✅ ¡Sin errores matemáticos!</div>`;
  } else {
    // Agrupar duplicados
    const agrupados = {};
    errReales.forEach(e => {
      const key = e.operacion;
      if (!agrupados[key]) agrupados[key] = { ...e, veces: 0 };
      agrupados[key].veces++;
    });
    const top = Object.values(agrupados).sort((a,b)=>b.veces-a.veces).slice(0, 8);
    listaEl.innerHTML = top.map(e => `
      <div class="error-item">
        <div>
          <div class="error-op">${e.operacion}</div>
          <div class="error-detail">Pusiste ${e.respuesta_dada} · Correcto: ${e.respuesta_correcta} · ${e.tipo_op}</div>
        </div>
        ${e.veces>1 ? `<div class="error-badge">${e.veces}×</div>` : ''}
      </div>
    `).join('');
  }

  document.getElementById("overlay").classList.add("show");
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = flashTimer>0 ? flashColor : "#0b1120";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  if (flashTimer>0) flashTimer--;

  // Grid
  ctx.lineWidth=0.5;
  for (let i=0; i<=CELLS; i++) {
    ctx.strokeStyle = i%5===0 ? "rgba(99,140,255,0.18)" : "rgba(99,140,255,0.07)";
    ctx.beginPath(); ctx.moveTo(i*SIZE,0); ctx.lineTo(i*SIZE,canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*SIZE); ctx.lineTo(canvas.width,i*SIZE); ctx.stroke();
  }

  // Snake
  snake.forEach((s,i) => {
    const t=i/snake.length;
    const r=Math.round(34+(2-34)*t), g=Math.round(222+(197-222)*t), b=Math.round(128+(94-128)*t);
    ctx.shadowColor=i===0?"#4ade80":"#22c55e"; ctx.shadowBlur=i===0?14:6;
    ctx.fillStyle=i===0?"#4ade80":`rgb(${r},${g},${b})`;
    const pad=i===0?1:2;
    roundRect(ctx,s.x*SIZE+pad,s.y*SIZE+pad,SIZE-pad*2,SIZE-pad*2,i===0?4:3);
    ctx.fill();
    if (i===0) {
      ctx.shadowBlur=0; ctx.fillStyle="#020617";
      [[0.3,0.3],[0.7,0.3]].forEach(([ox,oy]) => {
        ctx.beginPath();
        ctx.arc(s.x*SIZE+SIZE*ox+dir.x*3, s.y*SIZE+SIZE*oy+dir.y*3, 2.5, 0, Math.PI*2);
        ctx.fill();
      });
    }
  });
  ctx.shadowBlur=0;

  // Chips de respuesta
  answers.forEach(a => {
    const pulse=Math.sin(a.pulse||0)*0.5+0.5;
    ctx.shadowColor="rgba(148,163,184,0.3)"; ctx.shadowBlur=4+pulse*3;
    ctx.fillStyle="rgba(148,163,184,0.10)";
    roundRect(ctx,a.x*SIZE+1,a.y*SIZE+1,SIZE-2,SIZE-2,4); ctx.fill();
    ctx.strokeStyle=`rgba(148,163,184,${0.28+pulse*0.14})`; ctx.lineWidth=1; ctx.stroke();
    ctx.shadowBlur=0;
    ctx.font=`bold ${SIZE*0.65}px 'Orbitron',monospace`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillStyle="#e2e8f0";
    ctx.fillText(a.value, a.x*SIZE+SIZE/2, a.y*SIZE+SIZE/2);
  });

  updateParticles(); drawParticles();
}

// ── Controles ─────────────────────────────────────────────────────────────────
document.addEventListener("keydown", e => {
  const k=e.key.toLowerCase();
  if (["w","arrowup"].includes(k)    && dir.y===0) nextDir={x:0,y:-1};
  if (["s","arrowdown"].includes(k)  && dir.y===0) nextDir={x:0,y:1};
  if (["a","arrowleft"].includes(k)  && dir.x===0) nextDir={x:-1,y:0};
  if (["d","arrowright"].includes(k) && dir.x===0) nextDir={x:1,y:0};
  if (k==="r") initGame();
  if ([" ","arrowup","arrowdown","arrowleft","arrowright"].includes(k)) e.preventDefault();
});
document.getElementById("btn-up").addEventListener("click",    ()=>{ if(dir.y===0) nextDir={x:0,y:-1}; });
document.getElementById("btn-down").addEventListener("click",  ()=>{ if(dir.y===0) nextDir={x:0,y:1}; });
document.getElementById("btn-left").addEventListener("click",  ()=>{ if(dir.x===0) nextDir={x:-1,y:0}; });
document.getElementById("btn-right").addEventListener("click", ()=>{ if(dir.x===0) nextDir={x:1,y:0}; });
document.getElementById("restart-btn").addEventListener("click", initGame);

// ── Loop ──────────────────────────────────────────────────────────────────────
let lastTime=0;

function getGameSpeed() {
  const level = getLevel();
  // Velocidad base: 150ms
  // Cada nivel reduce 12ms (max 60ms en nivel 7+)
  const speed = Math.max(60, 150 - (level * 12));
  return speed;
}

function gameLoop(ts) {
  const INTERVAL = getGameSpeed();
  if (ts-lastTime>=INTERVAL) { update(); lastTime=ts; }
  draw();
  requestAnimationFrame(gameLoop);
}
initGame();
requestAnimationFrame(gameLoop);
</script>
